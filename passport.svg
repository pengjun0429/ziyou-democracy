<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="passport-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  
  <!-- 護照封面 -->
  <rect x="0" y="0" width="400" height="560" rx="8" fill="url(#passport-bg)" stroke="#1a252f" stroke-width="2"/>
  
  <!-- 國徽 -->
  <circle cx="200" cy="140" r="35" fill="none" stroke="#f39c12" stroke-width="2.5"/>
  <circle cx="200" cy="140" r="25" fill="none" stroke="#f39c12" stroke-width="1.5"/>
  <circle cx="200" cy="140" r="15" fill="none" stroke="#f39c12" stroke-width="1"/>
  <circle cx="200" cy="140" r="5" fill="#f39c12"/>
  
  <!-- 國名 -->
  <text x="200" y="220" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="22" font-weight="bold" fill="white" letter-spacing="4">資優民主國</text>
  <text x="200" y="250" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="12" fill="#f39c12" letter-spacing="2">國 民 護 照</text>
  <text x="200" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#bdc3c7" letter-spacing="1">PASSPORT</text>
  
  <!-- 分隔線 -->
  <line x1="60" y1="295" x2="340" y2="295" stroke="#f39c12" stroke-width="0.5"/>
  
  <!-- 標語 -->
  <text x="200" y="320" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="10" fill="#bdc3c7">反對惡性內卷，捍衛自由學習</text>
  
  <!-- 底部國名 -->
  <text x="200" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7f8c8d">Democratic Meritocracy of Ziyu</text>
  
  <!-- 護照標記 -->
  <text x="200" y="480" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="8" fill="#5d6d7e">本護照持有人受資優民主國之保護</text>
  
  <!-- 中間頁（打開後的內頁設計） -->
</svg>