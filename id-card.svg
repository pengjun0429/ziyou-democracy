<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" width="540" height="340">
  <defs>
    <linearGradient id="id-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="id-stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>
  
  <!-- 卡片背景 -->
  <rect x="0" y="0" width="540" height="340" rx="12" fill="white" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- 頂部色帶 -->
  <rect x="0" y="0" width="540" height="60" rx="12" fill="url(#id-bg)"/>
  <rect x="0" y="30" width="540" height="30" fill="url(#id-bg)"/>
  
  <!-- 國徽裝飾 -->
  <circle cx="270" cy="30" r="15" fill="#f39c12" opacity="0.3"/>
  <circle cx="270" cy="30" r="8" fill="#f39c12"/>
  
  <!-- 國名 -->
  <text x="270" y="25" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="bold" fill="white">資優民主國</text>
  
  <!-- 證件類型 -->
  <text x="270" y="48" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="12" fill="#f39c12" font-weight="bold">國 民 身 分 證</text>
  
  <!-- 照片框 -->
  <rect x="30" y="80" width="120" height="150" rx="4" fill="#f0f0f0" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90" y="160" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="10" fill="#95a5a6">照片</text>
  
  <!-- 資訊欄 -->
  <text x="170" y="95" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#7f8c8d">姓名</text>
  <text x="230" y="95" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#2c3e50" font-weight="bold">________________</text>
  
  <text x="170" y="125" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#7f8c8d">國籍</text>
  <text x="230" y="125" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#2c3e50">資優民主國</text>
  
  <text x="170" y="155" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#7f8c8d">身分證字號</text>
  <text x="260" y="155" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#2c3e50">________________</text>
  
  <text x="170" y="185" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#7f8c8d">出生日期</text>
  <text x="260" y="185" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#2c3e50">________________</text>
  
  <text x="170" y="215" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#7f8c8d">發證日期</text>
  <text x="260" y="215" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#2c3e50">________________</text>
  
  <!-- 底部條紋 -->
  <rect x="0" y="310" width="540" height="30" rx="0" fill="url(#id-stripe)"/>
  <rect x="0" y="328" width="540" height="12" rx="0" fill="url(#id-stripe)"/>
  
  <!-- 國旗條紋 -->
  <rect x="20" y="320" width="500" height="10" fill="none"/>
  
  <!-- 發證單位 -->
  <text x="270" y="325" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="9" fill="white">資優民主國內政部 發證</text>
  
  <!-- 框線裝飾 -->
  <rect x="10" y="70" width="520" height="230" rx="6" fill="none" stroke="#2980b9" stroke-width="0.5" stroke-dasharray="4,2"/>
</svg>